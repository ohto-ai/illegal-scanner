<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>

    <!-- Outer ring gradient: red → yellow → red (severity spectrum) -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e74c3c"/>
      <stop offset="25%"  stop-color="#f39c12"/>
      <stop offset="50%"  stop-color="#f1c40f"/>
      <stop offset="75%"  stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>

    <!-- Metallic gradient for magnifying glass -->
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#d0d0d0"/>
      <stop offset="30%"  stop-color="#f8f8f8"/>
      <stop offset="60%"  stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>

    <!-- Lens tint gradient -->
    <radialGradient id="lensTint" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0%"   stop-color="#3498db" stop-opacity="0.15"/>
      <stop offset="60%"  stop-color="#9b59b6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.2"/>
    </radialGradient>

    <!-- Red glow filter for illegal item -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <!-- Main circular badge -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#dropShadow)"/>

  <!-- Outer severity ring -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="url(#ringGrad)" stroke-width="5"/>

  <!-- Inner subtle border -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ===== SCANNER RADAR ELEMENTS ===== -->
  <!-- Subtle radar rings -->
  <circle cx="256" cy="256" r="70"  fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="4 12"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="2 16"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- Crosshair lines -->
  <line x1="56"  y1="256" x2="146" y2="256" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="366" y1="256" x2="456" y2="256" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="256" y1="56"  x2="256" y2="146" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="256" y1="366" x2="256" y2="456" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ===== MAGNIFYING GLASS ===== -->
  <g filter="url(#dropShadow)">
    <!-- Handle (angled 45° to bottom-right) -->
    <g transform="rotate(45, 256, 256)">
      <!-- Handle body -->
      <rect x="332" y="244" width="90" height="24" rx="12" fill="url(#metal)"/>
      <!-- Handle grip texture lines -->
      <line x1="352" y1="246" x2="352" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="362" y1="246" x2="362" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="372" y1="246" x2="372" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="382" y1="246" x2="382" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="392" y1="246" x2="392" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <line x1="402" y1="246" x2="402" y2="266" stroke="#999" stroke-width="1.5" stroke-opacity="0.5"/>
      <!-- Handle connector/bracket -->
      <rect x="316" y="236" width="22" height="40" rx="5" fill="url(#metal)"/>
      <rect x="318" y="238" width="18" height="36" rx="3" fill="#c8c8c8"/>
    </g>

    <!-- Lens outer rim -->
    <circle cx="256" cy="256" r="86" fill="url(#metal)"/>
    <!-- Lens inner rim shadow -->
    <circle cx="256" cy="256" r="80" fill="none" stroke="#888" stroke-width="2"/>
    <!-- Lens glass -->
    <circle cx="256" cy="256" r="78" fill="url(#lensTint)"/>

    <!-- Lens reflection/shine -->
    <ellipse cx="232" cy="222" rx="32" ry="22" fill="#ffffff" fill-opacity="0.08" transform="rotate(-35, 232, 222)"/>
    <ellipse cx="234" cy="220" rx="20" ry="10" fill="#ffffff" fill-opacity="0.06" transform="rotate(-35, 234, 220)"/>
  </g>

  <!-- ===== INSIDE LENS: ILLEGAL ITEM ===== -->
  <!-- Minecraft diamond/gem shape -->
  <polygon points="256,212 288,250 256,288 224,250"
           fill="#e74c3c" opacity="0.85" filter="url(#redGlow)"/>

  <!-- Gem inner highlight -->
  <polygon points="256,218 280,250 256,282 232,250"
           fill="#ff6b6b" opacity="0.4"/>

  <!-- Prohibition symbol (circle-slash) -->
  <circle cx="256" cy="250" r="34" fill="none" stroke="#ff3333" stroke-width="5.5"
          stroke-linecap="round" filter="url(#subtleGlow)"/>
  <line x1="232" y1="226" x2="280" y2="274" stroke="#ff3333" stroke-width="5.5"
        stroke-linecap="round" filter="url(#subtleGlow)"/>

  <!-- ===== YELLOW WARNING BADGE ===== -->
  <!-- Small warning indicator top-right of the lens -->
  <circle cx="322" cy="196" r="14" fill="#f39c12" filter="url(#subtleGlow)"/>
  <circle cx="322" cy="196" r="12" fill="#f1c40f"/>
  <text x="322" y="201" text-anchor="middle"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-weight="900" font-size="16" fill="#1a1a2e">!</text>

  <!-- ===== TYPOGRAPHY ===== -->
  <!-- Main title -->
  <text x="256" y="432" text-anchor="middle"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-weight="800" font-size="32" fill="#f0f0f0"
        letter-spacing="5">ILLEGAL SCANNER</text>

  <!-- Tagline -->
  <text x="256" y="462" text-anchor="middle"
        font-family="'Segoe UI', Arial, Helvetica, sans-serif"
        font-weight="400" font-size="13" fill="#888899"
        letter-spacing="8">DETECT • PROTECT</text>
</svg>
