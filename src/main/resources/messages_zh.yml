  active_items: "活跃记录: §c{illegal} ILLEGAL §e{suspicious} SUSPICIOUS (§f{total} 总计§7)"
  no_items: "§a数据库中没有活跃的非法物品记录。"
  list_header: "===== 活跃物品 (第 {page} 页) ====="
  list_footer: "第 {page}/{total_pages} 页  §e/is report list {next_page}"
  list_hint: "§e/is report list [页数]§7 — 浏览所有物品"
  detail_hint: "§e/is report detail <id>§7 — 查看完整详情"
  player_hint: "§e/is report player <名称>§7 — 按玩家查看"
  detail_header: "===== 物品 #{id} 详情 ====="
  detail_not_found: "§c未找到物品 #{id}。"
  detail_type: "§7类型: §f{type} §7x§f{count}"
  detail_severity: "§7严重级别: {severity}"
  detail_detected: "§7首次检测: §f{first}"
  detail_last_seen: "§7最后发现: §f{last} (§f{times} 次§7)"
  detail_location: "§7位置类型: §f{location_type}"
  detail_world: "§7世界: §f{world}"
  detail_player: "§7玩家: §f{player} §8({uuid})"
  detail_slot: "§7槽位: §f{slot}"
  detail_position: "§7坐标: §f{x}, {y}, {z}"
