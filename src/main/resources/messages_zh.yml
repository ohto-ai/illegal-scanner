  detail_entity: "§7实体: §f{entity} §8({euuid})"
  detail_violations: "§7违规项:"
  detail_violation_item: "  §8- §7{line}"
  detail_resolved: "§a已处理，处理人: {by}，时间: {at}"
  player_header: "===== {player} 的物品 ({count}) ====="
  player_none: "§a未找到玩家 {player} 的非法物品。"
  player_total: "§7总计: §f{count} §7个活跃物品。"
  player_format: "{severity}#{id} §f{type} §7槽位 {slot} §8[{time}]"

