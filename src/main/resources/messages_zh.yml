item:
  clean: "§a物品合法 — 未发现违规项。"
  header: "{severity} ===== {severity_label}: {type} ====="
  violation_line: "{color}  [{severity}] §7{type}: §f{message}"
  total: "{color}共 {count} 项违规。"
  hold_item: "§c请手持一个物品。"
  not_found: "§c未找到玩家: {player}。"
  info_header: "===== 物品信息: {type} ====="
  info_amount: "§7数量: §f{amount}  §7最大耐久: §f{durability}"
  info_enchants: "§7附魔: §f{enchants}"
  info_components: "§7数据组件:"
  info_component_line: "§8  - §7{key}: §f{value}"
  info_attr_header: "§7属性修饰:"
  info_attr_line: "§8  - §7{attr} = §f{value} §8(op:{op} slot:{slot})"

# ---- Status ----
status:
  header: "===== 状态 ====="
  db_counts: "§7数据库活跃: §c{illegal} ILLEGAL §e{suspicious} SUSPICIOUS"
  scanner: "§7扫描器: {status}"
  chunks: "§7已扫描区块: §f{chunks}"
  flagged: "§7标记物品: §f{flagged}"
  scan_running: "§e扫描进行中: §f{scanned}/{total} 区块已扫描, §c{flagged} 物品标记§e, §7{queued} 排队中"
  background: "§e后台扫描: §f{queued} 个任务排队中"
  idle: "§a扫描器空闲。"

# ---- DB ----
db:
  exporting: "§7正在导出数据库..."
  vacuumed: "§a数据库已压缩优化。"
  usage: "§e用法: /is db <export|vacuum>"

# ---- Reload ----
reload:
  done: "§a配置已重载。"

# ---- Alerts (console) ----
alert:
  illegal_inventory: "[{event}] 非法物品: {type} ({count}项违规) - {context}"
