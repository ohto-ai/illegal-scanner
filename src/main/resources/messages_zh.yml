# ============================================================================
# illegal-scanner - Simplified Chinese Messages
# ============================================================================

# ---- Plugin lifecycle ----
plugin:
  banner: "============================================"
  enabled: "illegal-scanner 已启用！"
  disabled: "illegal-scanner 已禁用。"
  config_loaded: "配置已加载。"
  config_failed: "配置加载失败！"
  db_initialized: "数据库已初始化。"
  db_failed: "数据库初始化失败！"
  validation_initialized: "校验引擎已初始化，共 {count} 个校验器。"
  validation_failed: "校验引擎初始化失败！"
  events_registered: "事件监听器已注册。"
  commands_registered: "命令已注册。"
  scan_scheduled: "扫描已安排，将在 {seconds} 秒后启动。"

# ---- Scan ----
scan:
  starting: "启动扫描{target}..."
