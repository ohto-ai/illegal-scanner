  already_running: "扫描已在运行中。"
  phase1_online: "阶段 1：扫描在线玩家..."
  phase1_done: "在线玩家扫描完成，标记 {count} 个物品。"
  phase2_loaded: "阶段 2：扫描已加载区块..."
  phase2_done: "世界 {world}：已加载区块中标记 {count} 个物品。"
  phase3_offline: "阶段 3：扫描离线玩家..."
  phase3_done: "离线玩家扫描完成，标记 {count} 个物品。"
  phase4_unloaded: "阶段 4：加入未加载区块扫描队列..."
  phase4_queued: "未加载区块扫描队列已填充，约 {count} 个区块。"
  scan_complete: "============================================"
  scan_complete_line: "全量扫描完成！"
  scan_stats: "已扫描区块: {chunks}，标记物品: {flagged}"
  scan_complete_footer: "============================================"
  scan_found_warning: "发现 {count} 个非法/可疑物品。使用 /is report 查看。"
  cancelled: "所有扫描已取消。"
  paused: "扫描已暂停。"
  resumed: "扫描已继续。"
  stopped: "扫描已停止。"
  restarted: "扫描已重新启动。"
  already_paused: "扫描已在暂停状态。"
  not_running: "扫描未在运行中。"
  session_not_found: "未找到扫描会话 #{id}。"
  player_scanning: "正在扫描玩家 {player}..."
  player_done: "扫描完成。标记 {count} 个物品。"
  chunk_scanning: "正在扫描当前区块..."
  chunk_done: "扫描完成。标记 {count} 个物品。"
  db_exported: "已导出 {count} 条记录到 plugins/illegal-scanner/export.json"

# ---- Report ----
report:
