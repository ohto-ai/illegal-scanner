name: illegal-scanner
version: ${version}
main: com.illegalscanner.IllegalScanner
api-version: "1.21"
description: ${description}
author: ServerAdmin
website: https://github.com/ohto-ai/illegal-scanner
softdepend: [WorldGuard, Residence]

permissions:
  illegalscanner.admin:
    description: "All illegal-scanner commands"
    default: op
    children:
      illegalscanner.report: true
      illegalscanner.inspect: true
      illegalscanner.scan: true
  illegalscanner.report:
    description: "View illegal item reports"
    default: op
  illegalscanner.inspect:
    description: "Check held item"
    default: op
  illegalscanner.scan:
    description: "Run scans"
    default: op
  illegalscanner.notify:
    description: "Receive admin notifications"
    default: op

commands:
  illegalscanner:
    description: "illegal-scanner main command"
    usage: "/is <subcommand>"
    aliases: [is]
